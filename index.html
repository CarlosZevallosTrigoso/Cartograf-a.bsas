<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#16170f">
<title>FORJA · baires</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --bg:#16170f; --panel:#1f2017cc; --line:#33352a;
    --ink:#d8d6c4; --ink-dim:#8a8c78;
    --accent:#8fa676; --accent-dim:#5c6b4b;
    --steel:#6f8ba3; --warn:#c08a5a;
    --mono: ui-monospace, "SF Mono", "DejaVu Sans Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  html,body{margin:0; height:100%; overscroll-behavior:none}
  body{font-family:var(--mono); font-size:12px; background:var(--bg); color:var(--ink)}
  button, select, input{touch-action:manipulation}
  #map{position:fixed; inset:0; height:100dvh; background:var(--bg)}

  /* barra superior */
  #bar{
    position:fixed; top:0; left:0; right:0; z-index:1000;
    display:flex; align-items:center; gap:10px;
    padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;
    background:var(--panel); backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
  }
  #bar h1{
    margin:0; font-size:12px; font-weight:600; letter-spacing:.14em;
    color:var(--ink); cursor:pointer; user-select:none; flex:1;
  }
  #bar button{
    font-family:var(--mono); font-size:11px; letter-spacing:.03em;
    background:#12130c; color:var(--ink); border:1px solid var(--line);
    border-radius:2px; padding:0 10px; min-height:38px; cursor:pointer;
  }
  #bar button:active{border-color:var(--accent); color:var(--accent)}
  #bar button.on{border-color:var(--steel); color:var(--steel)}

  /* aviso */
  #note{
    position:fixed; left:12px; right:12px; z-index:1000;
    bottom:calc(env(safe-area-inset-bottom) + 12px);
    background:var(--panel); border:1px solid var(--line); border-radius:2px;
    color:var(--warn); padding:8px 10px; font-size:11px; display:none;
    backdrop-filter:blur(6px);
  }

  /* formulario de nuevo lugar */
  #form{
    position:fixed; left:12px; right:12px; z-index:1100;
    bottom:calc(env(safe-area-inset-bottom) + 12px);
    background:#1f2017f2; border:1px solid var(--line); border-radius:2px;
    padding:12px; display:none; flex-direction:column; gap:8px;
    backdrop-filter:blur(8px);
  }
  #form.on{display:flex}
  #form label{color:var(--ink-dim); font-size:10px; letter-spacing:.06em; text-transform:uppercase}
  #form input, #form select{
    width:100%; background:#12130c; color:var(--ink); border:1px solid var(--line);
    border-radius:2px; padding:10px; font-family:var(--mono); font-size:16px;
  }
  #form input:focus, #form select:focus{outline:1px solid var(--accent); border-color:var(--accent)}
  #form .btns{display:flex; gap:8px; margin-top:2px}
  #form .btns button{
    flex:1; font-family:var(--mono); font-size:13px; padding:12px;
    border-radius:2px; border:1px solid var(--line); background:#12130c;
    color:var(--ink); cursor:pointer;
  }
  #form .btns button.primary{background:var(--accent-dim); border-color:var(--accent-dim); color:#0e0f08; font-weight:600}

  /* cajón de lista inferior */
  #tab{
    position:fixed; left:12px; z-index:1000;
    bottom:calc(env(safe-area-inset-bottom) + 12px);
    background:var(--panel); border:1px solid var(--line); border-radius:2px;
    color:var(--ink); padding:11px 14px; font-size:12px; letter-spacing:.06em;
    cursor:pointer; user-select:none; backdrop-filter:blur(6px);
  }
  #list{
    position:fixed; left:0; right:0; bottom:0; z-index:1050;
    max-height:55dvh; display:flex; flex-direction:column;
    background:#1f2017f2; border-top:1px solid var(--line);
    padding:10px 0 calc(env(safe-area-inset-bottom) + 8px);
    backdrop-filter:blur(8px);
    transform:translateY(105%); visibility:hidden;
    transition:transform .28s cubic-bezier(.2,.8,.2,1), visibility .28s;
  }
  #list.on{transform:translateY(0); visibility:visible}
  .grp{
    padding:10px 14px 4px; color:var(--accent); font-size:10px;
    letter-spacing:.12em; text-transform:uppercase;
    border-bottom:1px solid #33352a55;
  }
  #list .head{
    display:flex; justify-content:space-between; align-items:center;
    padding:0 14px 8px; border-bottom:1px solid var(--line);
    color:var(--ink-dim); font-size:10px; letter-spacing:.08em; text-transform:uppercase;
  }
  #list .head span{cursor:pointer; color:var(--ink); padding:2px 8px}
  #rows{overflow-y:auto; -webkit-overflow-scrolling:touch}
  .srch{display:flex; gap:8px; padding:10px 14px; border-bottom:1px solid var(--line)}
  .srch input{
    flex:1; background:#12130c; color:var(--ink); border:1px solid var(--line);
    border-radius:2px; padding:9px 10px; font-family:var(--mono); font-size:16px;
  }
  .srch input:focus{outline:1px solid var(--accent); border-color:var(--accent)}
  .srch button{
    font-family:var(--mono); font-size:12px; background:#12130c; color:var(--ink);
    border:1px solid var(--line); border-radius:2px; padding:0 14px; cursor:pointer;
  }
  .row-l .addr{display:block; color:var(--ink-dim); font-size:10px; line-height:1.3}
  .row-l{
    display:flex; align-items:center; gap:10px; padding:12px 14px; min-height:44px;
    border-bottom:1px solid #33352a55; cursor:pointer;
  }
  .row-l:active{background:#12130c}
  .row-l .dot{width:8px; height:8px; border-radius:50%; flex:none}
  .row-l .nm{flex:1; color:var(--ink); font-size:13px}
  .row-l .ct{color:var(--ink-dim); font-size:10px}
  .row-l .dist{color:var(--ink-dim); font-size:10px; font-variant-numeric:tabular-nums}
  #ordena.on{color:var(--accent)}
  .row-l.nuevo .nm::after{content:' ·'; color:var(--accent)}

  /* modo mapear: mira central */
  #xhair{
    position:fixed; left:50%; top:50%; z-index:900;
    width:34px; height:34px; margin:-17px 0 0 -17px;
    pointer-events:none; display:none;
  }
  body.mapear #xhair{display:block}
  #xhair::before, #xhair::after{
    content:''; position:absolute; left:50%; top:50%;
    width:30px; height:2px; margin:-1px 0 0 -15px;
    background:var(--accent); box-shadow:0 0 0 1px #16170f;
  }
  #xhair::before{transform:rotate(45deg)}
  #xhair::after{transform:rotate(-45deg)}
  body.mapear #xhair{animation:pulso 1.6s ease-in-out infinite}
  @keyframes pulso{
    0%,100%{opacity:1; transform:scale(1)}
    50%{opacity:.55; transform:scale(.92)}
  }
  .leaflet-overlay-pane path{animation:brote .35s ease-out backwards}
  @keyframes brote{
    from{opacity:0}
    to{opacity:1}
  }
  #pinhere{
    position:fixed; right:12px; z-index:1000; display:none;
    bottom:calc(env(safe-area-inset-bottom) + 12px);
    font-family:var(--mono); font-size:13px; font-weight:600;
    background:var(--accent-dim); color:#0e0f08; border:1px solid var(--accent-dim);
    border-radius:2px; padding:12px 16px; cursor:pointer;
  }
  body.mapear #pinhere{display:block}

  /* popups leaflet, adaptados */
  .leaflet-popup-content-wrapper{
    background:#1f2017; color:var(--ink); border:1px solid var(--line);
    border-radius:2px; font-family:var(--mono); font-size:12px;
  }
  .leaflet-popup-tip{background:#1f2017; border:1px solid var(--line)}
  .leaflet-popup-content{margin:10px 12px; line-height:1.5}
  .pp-nombre{font-weight:600; letter-spacing:.02em}
  .pp-cat{color:var(--accent); font-size:10px; text-transform:uppercase; letter-spacing:.08em}
  .pp-hora{color:var(--steel); font-size:10px; font-variant-numeric:tabular-nums}
  .pp-nota{color:var(--ink-dim); margin-top:2px}
  .pp-del{
    margin-top:8px; display:inline-block; color:var(--warn); cursor:pointer;
    border:1px solid var(--line); border-radius:2px; padding:2px 8px; font-size:10px;
  }
  .leaflet-container{font-family:var(--mono)}
  .leaflet-control-attribution{background:#16170fb0 !important; color:var(--ink-dim) !important; font-size:9px}
  .leaflet-control-attribution a{color:var(--steel) !important}
  .leaflet-bar a{background:#1f2017; color:var(--ink); border-bottom:1px solid var(--line)}
  .leaflet-bar a:hover{background:#12130c; color:var(--accent)}
</style>
</head>
<body>
  <div id="map"></div>

  <div id="bar">
    <h1 id="title">FORJA</h1>
    <button id="loc" title="mi ubicación">◉ ubicar</button>
    <button id="mapear" title="modo mapear">✕ mapear</button>
    <button id="share" title="compartir coordenadas">coords</button>
    <button id="exp" title="exportar JSON">↓ json</button>
  </div>

  <div id="tab">lugares</div>
  <div id="list">
    <div class="head"><b id="list-t">lugares</b><span><span id="ordena">cerca</span> <span id="list-x">cerrar</span></span></div>
    <div class="srch">
      <input id="q" placeholder="buscar en OSM…" autocomplete="off" enterkeyhint="search">
      <button id="q-go">buscar</button>
    </div>
    <div id="rows"></div>
  </div>

  <div id="xhair"></div>
  <button id="pinhere">pin aquí</button>

  <div id="note"></div>

  <div id="form">
    <label>nuevo lugar</label>
    <input id="f-nombre" placeholder="nombre" autocomplete="off">
    <select id="f-cat">
      <option value="galerías">galerías</option>
      <option value="café">café</option>
      <option value="comida">comida</option>
      <option value="basicos">basicos</option>
      <option value="msa">msa</option>
      <option value="otro">otro</option>
    </select>
    <input id="f-nota" placeholder="nota (opcional)" autocomplete="off">
    <label>hora</label>
    <input id="f-hora" type="time" autocomplete="off">
    <div class="btns">
      <button id="f-cancel">cancelar</button>
      <button id="f-ok" class="primary">guardar pin</button>
    </div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
'use strict';
const LS_KEY = 'forja-baires-nuevos';
const CAT_COLOR = {
  'basicos':'#6f8ba3', 'galerías':'#b06a36', 'msa':'#8fa676',
  'café':'#c08a5a', 'comida':'#d8d6c4', 'otro':'#8a8c78'
};
const $ = id => document.getElementById(id);

let semilla = [];   // lugares.json del repo
let nuevos = [];    // pines del día (localStorage)
let pendiente = null; // latlng del pin en formulario

// ---------- mapa ----------
const map = L.map('map', { zoomControl:true }).setView([-34.6037, -58.3816], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 20, subdomains: 'abcd',
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
}).addTo(map);
map.zoomControl.setPosition('bottomright');

const capa = L.layerGroup().addTo(map);

// ---------- estado ----------
function cargarNuevos(){
  try{ nuevos = JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch(e){ nuevos = []; }
  if(!Array.isArray(nuevos)) nuevos = [];
}
function guardarNuevos(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(nuevos)); }
  catch(e){ aviso('No se pudo guardar en el navegador. Exporta el JSON.'); }
}
function valido(p){
  return p && typeof p.nombre==='string' &&
         Number.isFinite(p.lat) && Number.isFinite(p.lon);
}

// ---------- render ----------
let refs = []; // {p, m, esNuevo} para la lista
function pintar(){
  capa.clearLayers(); refs = [];
  semilla.filter(valido).forEach(p => marcador(p, false));
  nuevos.filter(valido).forEach((p,i) => marcador(p, true, i));
  $('tab').textContent = 'lugares · ' + refs.length;
  pintarLista();
}
let ordenCerca = false;
function fmtDist(m){
  return m < 1000 ? Math.round(m) + ' m' : (m/1000).toFixed(1) + ' km';
}
function pintarLista(){
  const rows = $('rows'); rows.innerHTML = '';
  $('list-t').textContent = 'lugares · ' + refs.length;
  const pos = dot ? dot.getLatLng() : null;
  $('ordena').classList.toggle('on', ordenCerca && !!pos);

  let orden;
  if(ordenCerca && pos){
    // plano, del más cercano al más lejano
    orden = refs.slice().sort((a,b) =>
      pos.distanceTo([a.p.lat, a.p.lon]) - pos.distanceTo([b.p.lat, b.p.lon]));
  } else {
    orden = refs.slice().sort((a,b) =>
      (a.p.cat||'').localeCompare(b.p.cat||'') || a.p.nombre.localeCompare(b.p.nombre));
  }

  let grupoActual = null;
  orden.forEach(r => {
    const cat = r.p.cat || 'otro';
    if(!(ordenCerca && pos) && cat !== grupoActual){
      grupoActual = cat;
      const g = document.createElement('div');
      g.className = 'grp'; g.textContent = cat;
      rows.appendChild(g);
    }
    const div = document.createElement('div');
    div.className = 'row-l' + (r.esNuevo ? ' nuevo' : '');
    const col = CAT_COLOR[cat] || CAT_COLOR.otro;
    const dist = pos ? '<span class="dist">'+fmtDist(pos.distanceTo([r.p.lat, r.p.lon]))+'</span>' : '';
    div.innerHTML = '<span class="dot" style="background:'+col+'"></span>'+
      '<span class="nm">'+esc(r.p.nombre)+'</span>' + dist;
    div.addEventListener('click', ()=>{
      $('list').classList.remove('on');
      map.flyTo([r.p.lat, r.p.lon], Math.max(map.getZoom(), 16), {duration:.7});
      setTimeout(()=> r.m.openPopup(), 750);
    });
    rows.appendChild(div);
  });
}
function marcador(p, esNuevo, idx){
  const col = CAT_COLOR[p.cat] || CAT_COLOR.otro;
  const base = p.cat === 'basicos';
  if(base){
    L.circleMarker([p.lat, p.lon], {
      radius: 16, color: col, weight: 1, opacity: .35,
      fillColor: col, fillOpacity: .12, interactive: false
    }).addTo(capa);
  }
  const m = L.circleMarker([p.lat, p.lon], {
    radius: base ? 9 : 7, color: col, weight: base ? 3 : 2,
    fillColor: col, fillOpacity: esNuevo ? .35 : .85,
    dashArray: esNuevo ? '3 3' : null
  }).addTo(capa);
  const el = m.getElement();
  if(el) el.style.animationDelay = (refs.length * 35) + 'ms';
  const div = document.createElement('div');
  div.innerHTML =
    '<div class="pp-cat">'+esc(p.cat||'otro')+(esNuevo?' · nuevo':'')+'</div>'+
    '<div class="pp-nombre">'+esc(p.nombre)+(p.hora?' <span class="pp-hora">'+esc(p.hora)+'</span>':'')+'</div>'+
    (p.nota ? '<div class="pp-nota">'+esc(p.nota)+'</div>' : '')+
    '<a class="pp-del" style="color:#6f8ba3;text-decoration:none" target="_blank" rel="noopener" '+
    'href="https://maps.google.com/?q='+p.lat+','+p.lon+'">→ maps</a>';
  if(esNuevo){
    const del = document.createElement('span');
    del.className = 'pp-del'; del.textContent = 'eliminar';
    del.style.marginLeft = '8px';
    del.addEventListener('click', ()=>{ nuevos.splice(idx,1); guardarNuevos(); pintar(); map.closePopup(); });
    div.appendChild(del);
  }
  m.bindPopup(div);
  refs.push({p, m, esNuevo});
}
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function horaActual(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function aviso(txt, ms){
  const n = $('note'); n.textContent = txt; n.style.display = 'block';
  clearTimeout(aviso.t); aviso.t = setTimeout(()=>{ n.style.display='none'; }, ms||5000);
}

// ---------- carga de lugares.json ----------
fetch('lugares.json', {cache:'no-store'})
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(j => {
    semilla = Array.isArray(j) ? j.filter(valido) : [];
    pintar(); encuadrar();
  })
  .catch(() => {
    aviso('No se pudo cargar lugares.json — solo se muestran pines locales.');
    pintar(); encuadrar();
  });
cargarNuevos();

function encuadrar(){
  const todos = semilla.concat(nuevos).filter(valido);
  if(!todos.length) return;
  const b = L.latLngBounds(todos.map(p => [p.lat, p.lon]));
  map.fitBounds(b.pad(0.15));
}

// ---------- nuevo pin: solo en modo mapear, con la mira ----------
$('f-cancel').addEventListener('click', ()=>{ pendiente=null; $('form').classList.remove('on'); });
$('f-ok').addEventListener('click', ()=>{
  if(!pendiente) return;
  const nombre = $('f-nombre').value.trim();
  if(!nombre){ $('f-nombre').focus(); return; }
  nuevos.push({
    nombre, cat: $('f-cat').value,
    nota: $('f-nota').value.trim() || undefined,
    hora: $('f-hora').value || undefined,
    lat: +pendiente.lat.toFixed(6), lon: +pendiente.lng.toFixed(6)
  });
  guardarNuevos(); pintar();
  pendiente = null; $('form').classList.remove('on');
});

// ---------- exportar ----------
$('exp').addEventListener('click', ()=>{
  const todos = semilla.concat(nuevos);
  const blob = new Blob([JSON.stringify(todos, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'lugares.json';
  a.click(); URL.revokeObjectURL(a.href);
  if(nuevos.length){
    setTimeout(()=>{
      if(confirm('Exportado con '+nuevos.length+' nuevos. ¿Vaciar los pines locales? (hazlo solo si ya actualizaste el repo)')){
        nuevos = []; guardarNuevos(); pintar();
      }
    }, 400);
  }
});

// ---------- ubicar ----------
let watchId = null, dot = null;
$('loc').addEventListener('click', ()=>{
  // ya activo: re-centrar en mi posición; si ya estoy centrado, apagar
  if(watchId !== null && dot){
    const d = map.getCenter().distanceTo(dot.getLatLng());
    if(d > 30){
      map.setView(dot.getLatLng(), Math.max(map.getZoom(), 16));
    } else {
      navigator.geolocation.clearWatch(watchId); watchId = null;
      map.removeLayer(dot); dot = null;
      $('loc').classList.remove('on');
    }
    return;
  }
  if(!('geolocation' in navigator)){ aviso('Sin geolocalización en este navegador.'); return; }
  $('loc').classList.add('on');
  watchId = navigator.geolocation.watchPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    if(!dot){
      dot = L.circleMarker(ll, {radius:6, color:'#6f8ba3', weight:2, fillColor:'#6f8ba3', fillOpacity:.9}).addTo(map);
      map.setView(ll, Math.max(map.getZoom(), 16));
    } else dot.setLatLng(ll);
  }, err => {
    aviso('Ubicación: '+err.message);
    $('loc').classList.remove('on'); watchId = null;
  }, {enableHighAccuracy:true, maximumAge:5000, timeout:15000});
});

// ---------- compartir coordenadas exactas ----------
function coordsTexto(lat, lon){
  const c = lat.toFixed(6) + ', ' + lon.toFixed(6);
  return c + '\nhttps://maps.google.com/?q=' + lat.toFixed(6) + ',' + lon.toFixed(6);
}
function copiar(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt)
      .then(()=> aviso('Coordenadas copiadas.'))
      .catch(()=> prompt('Copia manualmente:', txt));
  } else prompt('Copia manualmente:', txt);
}
$('share').addEventListener('click', ()=>{
  if(dot){ copiar(coordsTexto(dot.getLatLng().lat, dot.getLatLng().lng)); return; }
  if(!('geolocation' in navigator)){ aviso('Sin geolocalización en este navegador.'); return; }
  aviso('Obteniendo posición…', 15000);
  navigator.geolocation.getCurrentPosition(
    pos => copiar(coordsTexto(pos.coords.latitude, pos.coords.longitude)),
    err => aviso('Ubicación: '+err.message),
    {enableHighAccuracy:true, timeout:15000}
  );
});

// ---------- cajón de lista ----------
$('tab').addEventListener('click', ()=>{ pintarLista(); $('list').classList.add('on'); });
$('list-x').addEventListener('click', ()=> $('list').classList.remove('on'));
$('ordena').addEventListener('click', ()=>{
  if(!dot){ aviso('Activa ◉ ubicar para ordenar por cercanía.'); return; }
  ordenCerca = !ordenCerca;
  pintarLista();
});

// ---------- búsqueda Nominatim (OSM), acotada a Buenos Aires ----------
const BA_VIEWBOX = '-58.60,-34.75,-58.25,-34.50'; // lon1,lat1,lon2,lat2
let buscando = false;
function buscar(){
  const q = $('q').value.trim();
  if(!q || buscando) return;
  buscando = true; $('q-go').textContent = '…';
  const url = 'https://nominatim.openstreetmap.org/search?format=jsonv2'+
    '&q='+encodeURIComponent(q)+
    '&viewbox='+BA_VIEWBOX+'&bounded=1&limit=8&accept-language=es';
  fetch(url)
    .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(res => {
      const rows = $('rows'); rows.innerHTML = '';
      $('list-t').textContent = 'resultados · ' + res.length;
      if(!res.length){
        rows.innerHTML = '<div class="row-l"><span class="nm" style="color:var(--ink-dim)">sin resultados en OSM — prueba con la dirección</span></div>';
        return;
      }
      res.forEach(r => {
        const lat = parseFloat(r.lat), lon = parseFloat(r.lon);
        if(!Number.isFinite(lat) || !Number.isFinite(lon)) return;
        const partes = (r.display_name||'').split(',');
        const nombre = partes[0].trim();
        const resto = partes.slice(1, 4).join(',').trim();
        const div = document.createElement('div');
        div.className = 'row-l';
        div.innerHTML = '<span class="dot" style="background:var(--steel)"></span>'+
          '<span class="nm">'+esc(nombre)+'<span class="addr">'+esc(resto)+'</span></span>';
        div.addEventListener('click', ()=>{
          $('list').classList.remove('on');
          map.flyTo([lat, lon], 17, {duration:.7});
          pendiente = {lat, lng: lon};
          $('f-nombre').value = nombre; $('f-nota').value = '';
          $('f-hora').value = horaActual();
          $('form').classList.add('on');
        });
        rows.appendChild(div);
      });
    })
    .catch(err => aviso('Búsqueda: '+err.message))
    .finally(()=>{ buscando = false; $('q-go').textContent = 'buscar'; });
}
$('q-go').addEventListener('click', buscar);
$('q').addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); buscar(); } });

// ---------- modo mapear: mira central ----------
$('mapear').addEventListener('click', ()=>{
  const on = document.body.classList.toggle('mapear');
  $('mapear').classList.toggle('on', on);
  if(on) $('list').classList.remove('on');
});
$('pinhere').addEventListener('click', ()=>{
  pendiente = map.getCenter();
  $('f-nombre').value = ''; $('f-nota').value = '';
  $('f-hora').value = horaActual();
  $('form').classList.add('on');
  $('f-nombre').focus();
});

// ---------- convención: título recarga ----------
$('title').addEventListener('click', ()=> location.reload());

pintar();
})();
</script>
</body>
</html>
